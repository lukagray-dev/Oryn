<svg width="512" height="512" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!--
    Operon Brand Logo
    Based on the AI assistant avatar: blob body, curved antennae,
    dark eyes with cyan pupils, rounded arms, pillar legs, gentle smile.
  -->
  <defs>
    <!-- Body: radial gradient for 3D blob depth (lighter upper-left) -->
    <radialGradient id="bodyGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <!-- Arms: slightly darker radial gradient for depth -->
    <radialGradient id="armGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>

  <!-- Legs — thin rounded-rect pillars at bottom, behind body -->
  <rect x="46" y="91" width="7" height="18" rx="3.5" fill="#1d4ed8"/>
  <rect x="67" y="91" width="7" height="18" rx="3.5" fill="#1d4ed8"/>

  <!-- Arms — small rounded blobs on each side, behind body -->
  <ellipse cx="18" cy="62" rx="12" ry="14" fill="url(#armGrad)"/>
  <ellipse cx="102" cy="62" rx="12" ry="14" fill="url(#armGrad)"/>

  <!-- Body — large circular blob -->
  <circle cx="60" cy="55" r="38" fill="url(#bodyGrad)"/>

  <!-- Antennae — curved lines with hooked tips, on top of body -->
  <path d="M 43 19 C 40 10 33 4 38 1" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 77 19 C 80 10 87 4 82 1" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left eye — dark circle with cyan pupil and white glint -->
  <circle cx="45" cy="48" r="10" fill="#111827"/>
  <circle cx="45" cy="48" r="3.5" fill="#00f5d4"/>
  <circle cx="43" cy="45" r="1.5" fill="white" opacity="0.35"/>

  <!-- Right eye — dark circle with cyan pupil and white glint -->
  <circle cx="75" cy="48" r="10" fill="#111827"/>
  <circle cx="75" cy="48" r="3.5" fill="#00f5d4"/>
  <circle cx="73" cy="45" r="1.5" fill="white" opacity="0.35"/>

  <!-- Mouth — gentle smile -->
  <path d="M 50 68 Q 60 75 70 68" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks — subtle blush -->
  <circle cx="33" cy="58" r="5" fill="#60a5fa" opacity="0.25"/>
  <circle cx="87" cy="58" r="5" fill="#60a5fa" opacity="0.25"/>
</svg>
